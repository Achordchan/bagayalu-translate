name: Build and Release macOS

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      version:
        description: 要发布的版本号，必须与 Xcode 中的 MARKETING_VERSION 一致
        required: true
        default: 1.2.1
        type: string

permissions:
  contents: write

concurrency:
  group: macos-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-macos:
    name: Build macOS App
    runs-on: macos-15

    env:
      XCODE_PROJECT: 大佐翻译官v1.xcodeproj
      XCODE_SCHEME: dazuofanyiguan
      XCODE_TARGET: 大佐翻译官v1
      APP_NAME: 大佐翻译官v1
      DERIVED_DATA_PATH: build
      BUILD_PRODUCTS_PATH: build-products
      RELEASE_VERSION: ${{ inputs.version }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Validate release version
        if: github.event_name == 'workflow_dispatch'
        run: |
          set -euo pipefail

          PROJECT_VERSION="$(
            xcodebuild \
              -project "$XCODE_PROJECT" \
              -target "$XCODE_TARGET" \
              -configuration Release \
              -showBuildSettings |
            awk '/MARKETING_VERSION =/ { print $3; exit }'
          )"
          PROJECT_BUILD="$(
            xcodebuild \
              -project "$XCODE_PROJECT" \
              -target "$XCODE_TARGET" \
              -configuration Release \
              -showBuildSettings |
            awk '/CURRENT_PROJECT_VERSION =/ { print $3; exit }'
          )"

          if [ -z "$RELEASE_VERSION" ]; then
            echo "发布版本号不能为空。" >&2
            exit 1
          fi

          if ! [[ "$RELEASE_VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "发布版本号必须使用 x.y.z 格式。" >&2
            exit 1
          fi

          if [ "$PROJECT_VERSION" != "$RELEASE_VERSION" ]; then
            echo "工作流版本 $RELEASE_VERSION 与项目版本 $PROJECT_VERSION 不一致。" >&2
            exit 1
          fi

          if ! [[ "$PROJECT_BUILD" =~ ^[0-9]+$ ]] || [ "$PROJECT_BUILD" -le 0 ]; then
            echo "CURRENT_PROJECT_VERSION 必须是正整数。" >&2
            exit 1
          fi

          LATEST_APPCAST="$RUNNER_TEMP/latest-appcast.xml"
          if curl --fail --location --silent --show-error \
            "https://github.com/Achordchan/bagayalu-translate/releases/latest/download/appcast.xml" \
            --output "$LATEST_APPCAST"; then
            LATEST_BUILD="$(
              sed -n 's|.*<sparkle:version>\\([^<]*\\)</sparkle:version>.*|\\1|p' \
                "$LATEST_APPCAST" |
              head -1
            )"
            if [[ "$LATEST_BUILD" =~ ^[0-9]+$ ]] && [ "$PROJECT_BUILD" -le "$LATEST_BUILD" ]; then
              echo "构建号 $PROJECT_BUILD 必须大于线上构建号 $LATEST_BUILD。" >&2
              exit 1
            fi
          fi

          TAG="v$RELEASE_VERSION"
          if git ls-remote --exit-code --tags origin "refs/tags/$TAG" >/dev/null 2>&1; then
            echo "Tag $TAG 已存在，请提升版本号后重新发布。" >&2
            exit 1
          fi

      - name: Build architecture-specific Release apps
        run: |
          set -euo pipefail

          for ARCH in arm64 x86_64; do
            OUTPUT_PATH="$GITHUB_WORKSPACE/$BUILD_PRODUCTS_PATH/$ARCH"
            xcodebuild \
              -project "$XCODE_PROJECT" \
              -scheme "$XCODE_SCHEME" \
              -configuration Release \
              -destination "generic/platform=macOS" \
              -derivedDataPath "$DERIVED_DATA_PATH" \
              ARCHS="$ARCH" \
              ONLY_ACTIVE_ARCH=YES \
              CONFIGURATION_BUILD_DIR="$OUTPUT_PATH" \
              CODE_SIGN_STYLE=Manual \
              CODE_SIGN_IDENTITY=- \
              CODE_SIGN_INJECT_BASE_ENTITLEMENTS=NO \
              DEVELOPMENT_TEAM="" \
              build
          done

      - name: Verify app signatures and architectures
        run: |
          set -euo pipefail

          for ARCH in arm64 x86_64; do
            APP_PATH="$BUILD_PRODUCTS_PATH/$ARCH/$APP_NAME.app"

            if [ ! -d "$APP_PATH" ]; then
              echo "找不到 $ARCH 构建产物：$APP_PATH" >&2
              exit 1
            fi

            codesign --verify --deep --strict --verbose=4 "$APP_PATH"

            ARCHITECTURES="$(lipo -archs "$APP_PATH/Contents/MacOS/$APP_NAME")"
            echo "$ARCH 构建架构：$ARCHITECTURES"
            [ "$ARCHITECTURES" = "$ARCH" ]
          done

      - name: Package app and DMG
        run: |
          set -euo pipefail

          ARM64_APP_PATH="$BUILD_PRODUCTS_PATH/arm64/$APP_NAME.app"
          VERSION="$(
            /usr/libexec/PlistBuddy \
              -c 'Print :CFBundleShortVersionString' \
              "$ARM64_APP_PATH/Contents/Info.plist"
          )"

          mkdir -p dist/update

          for ARCH in arm64 x86_64; do
            APP_PATH="$BUILD_PRODUCTS_PATH/$ARCH/$APP_NAME.app"
            ARCHIVE_NAME="bagayalu-translate-v$VERSION-$ARCH.zip"
            DMG_NAME="bagayalu-translate-v$VERSION-$ARCH.dmg"
            DMG_ROOT="dist/dmg-root-$ARCH"

            ditto -c -k --sequesterRsrc --keepParent \
              "$APP_PATH" \
              "dist/update/$ARCHIVE_NAME"

            mkdir -p "$DMG_ROOT"
            ditto "$APP_PATH" "$DMG_ROOT/$APP_NAME.app"
            ln -s /Applications "$DMG_ROOT/Applications"
            hdiutil create \
              -volname "大佐翻译官 v$VERSION $ARCH" \
              -srcfolder "$DMG_ROOT" \
              -ov \
              -format UDZO \
              "dist/$DMG_NAME"

            rm -rf "$DMG_ROOT"
          done

      - name: Generate signed Sparkle appcast
        if: github.event_name == 'workflow_dispatch'
        env:
          SPARKLE_PRIVATE_KEY: ${{ secrets.SPARKLE_PRIVATE_KEY }}
        run: |
          set -euo pipefail

          if [ -z "$SPARKLE_PRIVATE_KEY" ]; then
            echo "仓库缺少 SPARKLE_PRIVATE_KEY Secret。" >&2
            exit 1
          fi

          GENERATE_APPCAST="$(
            find "$DERIVED_DATA_PATH/SourcePackages/artifacts" \
              -type f \
              -path '*/Sparkle/bin/generate_appcast' \
              -print \
              -quit
          )"

          if [ -z "$GENERATE_APPCAST" ]; then
            echo "找不到 Sparkle generate_appcast 工具。" >&2
            exit 1
          fi

          for ARCH in arm64 x86_64; do
            cat > "dist/update/bagayalu-translate-v$RELEASE_VERSION-$ARCH.md" <<EOF
          # 大佐翻译官 v$RELEASE_VERSION

          - Mini 模式会自动识别中外文并选择更合适的翻译方向。
          - 新增原文、译文和 Mini 窗口独立字号滑块及实时预览。
          - 优先启用全局快捷键，并增强授权刷新、失败回退和模式提醒。
          - 主界面可直接切换翻译服务，设置页接口配置更清晰。
          - Mini 智能方向介入时会在结果底部显示状态提示。
          EOF
          done

          printf '%s' "$SPARKLE_PRIVATE_KEY" |
            "$GENERATE_APPCAST" \
              --ed-key-file - \
              --download-url-prefix \
              "https://github.com/Achordchan/bagayalu-translate/releases/download/v$RELEASE_VERSION/" \
              --link \
              "https://github.com/Achordchan/bagayalu-translate" \
              --embed-release-notes \
              --maximum-deltas 0 \
              dist/update

          test -f dist/update/appcast.xml
          xmllint --noout dist/update/appcast.xml
          grep -q 'sparkle:edSignature' dist/update/appcast.xml
          grep -q "bagayalu-translate-v$RELEASE_VERSION-arm64.zip" dist/update/appcast.xml
          grep -q "bagayalu-translate-v$RELEASE_VERSION-x86_64.zip" dist/update/appcast.xml
          grep -q '<sparkle:hardwareRequirements>arm64</sparkle:hardwareRequirements>' dist/update/appcast.xml

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: 大佐翻译官-macOS
          path: |
            dist/*.dmg
            dist/update/*.zip
          if-no-files-found: error

      - name: Create Tag and GitHub Release
        if: github.event_name == 'workflow_dispatch'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          RELEASE_NOTES="dist/release-notes.md"
          cat > "$RELEASE_NOTES" <<EOF
          ## 大佐翻译官 v$RELEASE_VERSION

          - Mini 模式会自动识别中外文并选择更合适的翻译方向。
          - 新增原文、译文和 Mini 窗口独立字号滑块及实时预览。
          - 优先启用全局快捷键，并增强授权刷新、失败回退和模式提醒。
          - 主界面可直接切换翻译服务，设置页接口配置更清晰。
          - Mini 智能方向介入时会在结果底部显示状态提示。
          - 分别提供 Apple Silicon（arm64）和 Intel（x86_64）安装包。

          > 当前发布使用 ad-hoc 签名，首次安装仍可能需要在系统设置中手动放行。
          EOF

          gh release create "v$RELEASE_VERSION" \
            --target "$GITHUB_SHA" \
            --title "大佐翻译官 v$RELEASE_VERSION" \
            --notes-file "$RELEASE_NOTES" \
            dist/*.dmg \
            dist/update/*.zip \
            "dist/update/appcast.xml"
