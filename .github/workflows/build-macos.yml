name: Build and Release macOS

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      version:
        description: 要发布的版本号，必须与 Xcode 中的 MARKETING_VERSION 一致
        required: true
        default: 1.2.2
        type: string

permissions:
  contents: read

concurrency:
  group: macos-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-macos:
    name: Build macOS App
    runs-on: macos-15
    permissions:
      contents: read

    env:
      XCODE_PROJECT: 大佐翻译官v1.xcodeproj
      XCODE_SCHEME: dazuofanyiguan
      XCODE_TARGET: 大佐翻译官v1
      APP_NAME: 大佐翻译官v1
      DERIVED_DATA_PATH: build
      BUILD_PRODUCTS_PATH: build-products
      RELEASE_VERSION: ${{ inputs.version }}

    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Validate release version
        if: github.event_name == 'workflow_dispatch'
        run: |
          set -euo pipefail

          PROJECT_VERSION="$(
            xcodebuild \
              -project "$XCODE_PROJECT" \
              -target "$XCODE_TARGET" \
              -configuration Release \
              -showBuildSettings |
            awk '/MARKETING_VERSION =/ { print $3; exit }'
          )"
          PROJECT_BUILD="$(
            xcodebuild \
              -project "$XCODE_PROJECT" \
              -target "$XCODE_TARGET" \
              -configuration Release \
              -showBuildSettings |
            awk '/CURRENT_PROJECT_VERSION =/ { print $3; exit }'
          )"

          if [ -z "$RELEASE_VERSION" ]; then
            echo "发布版本号不能为空。" >&2
            exit 1
          fi

          if ! [[ "$RELEASE_VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "发布版本号必须使用 x.y.z 格式。" >&2
            exit 1
          fi

          if [ "$PROJECT_VERSION" != "$RELEASE_VERSION" ]; then
            echo "工作流版本 $RELEASE_VERSION 与项目版本 $PROJECT_VERSION 不一致。" >&2
            exit 1
          fi

          if ! [[ "$PROJECT_BUILD" =~ ^[0-9]+$ ]] || [ "$PROJECT_BUILD" -le 0 ]; then
            echo "CURRENT_PROJECT_VERSION 必须是正整数。" >&2
            exit 1
          fi

          LATEST_APPCAST="$RUNNER_TEMP/latest-appcast.xml"
          if curl --fail --location --silent --show-error \
            "https://github.com/Achordchan/bagayalu-translate/releases/latest/download/appcast.xml" \
            --output "$LATEST_APPCAST"; then
            LATEST_BUILD="$(
              sed -n 's|.*<sparkle:version>\\([^<]*\\)</sparkle:version>.*|\\1|p' \
                "$LATEST_APPCAST" |
              head -1
            )"
            if [[ "$LATEST_BUILD" =~ ^[0-9]+$ ]] && [ "$PROJECT_BUILD" -le "$LATEST_BUILD" ]; then
              echo "构建号 $PROJECT_BUILD 必须大于线上构建号 $LATEST_BUILD。" >&2
              exit 1
            fi
          fi

          TAG="v$RELEASE_VERSION"
          if git ls-remote --exit-code --tags origin "refs/tags/$TAG" >/dev/null 2>&1; then
            echo "Tag $TAG 已存在，请提升版本号后重新发布。" >&2
            exit 1
          fi

      - name: Build architecture-specific Release apps
        run: |
          set -euo pipefail

          SIGNING_ARGUMENTS=(
            "CODE_SIGNING_ALLOWED=NO"
            "CODE_SIGNING_REQUIRED=NO"
          )

          for ARCH in arm64 x86_64; do
            OUTPUT_PATH="$GITHUB_WORKSPACE/$BUILD_PRODUCTS_PATH/$ARCH"
            xcodebuild \
              -project "$XCODE_PROJECT" \
              -scheme "$XCODE_SCHEME" \
              -configuration Release \
              -destination "generic/platform=macOS" \
              -derivedDataPath "$DERIVED_DATA_PATH" \
              ARCHS="$ARCH" \
              ONLY_ACTIVE_ARCH=YES \
              CONFIGURATION_BUILD_DIR="$OUTPUT_PATH" \
              "${SIGNING_ARGUMENTS[@]}" \
              build
          done

      - name: Verify update configuration, signatures, and architectures
        run: |
          set -euo pipefail

          for ARCH in arm64 x86_64; do
            APP_PATH="$BUILD_PRODUCTS_PATH/$ARCH/$APP_NAME.app"

            if [ ! -d "$APP_PATH" ]; then
              echo "找不到 $ARCH 构建产物：$APP_PATH" >&2
              exit 1
            fi

            ARCHITECTURES="$(lipo -archs "$APP_PATH/Contents/MacOS/$APP_NAME")"
            echo "$ARCH 构建架构：$ARCHITECTURES"
            [ "$ARCHITECTURES" = "$ARCH" ]

            if [ "$ARCH" = "arm64" ]; then
              # Apple Silicon 可执行文件由链接器生成最小 ad-hoc 签名；
              # 这不是 Developer ID 分发签名，也不应封装 App 资源或权限。
              SIGNATURE_INFO="$(codesign -dv --verbose=4 "$APP_PATH" 2>&1)"
              printf '%s\n' "$SIGNATURE_INFO"
              grep -q 'flags=.*adhoc,linker-signed' <<< "$SIGNATURE_INFO"
              grep -q 'Signature=adhoc' <<< "$SIGNATURE_INFO"
              grep -q 'Info.plist=not bound' <<< "$SIGNATURE_INFO"
              grep -q 'TeamIdentifier=not set' <<< "$SIGNATURE_INFO"
              grep -q 'Internal requirements=none' <<< "$SIGNATURE_INFO"
            elif codesign -dv --verbose=4 "$APP_PATH" >/dev/null 2>&1; then
              echo "$ARCH 主程序不应包含分发签名。" >&2
              exit 1
            fi

            if /usr/libexec/PlistBuddy \
              -c 'Print :SUEnableInstallerLauncherService' \
              "$APP_PATH/Contents/Info.plist" >/dev/null 2>&1; then
              echo "$ARCH 主程序不应启用 sandbox InstallerLauncher XPC。" >&2
              exit 1
            fi

            ENTITLEMENTS="$(codesign -d --entitlements :- "$APP_PATH" 2>/dev/null || true)"
            if grep -q 'com.apple.security.app-sandbox' <<< "$ENTITLEMENTS"; then
              echo "$ARCH 主程序不应包含 App Sandbox 权限。" >&2
              exit 1
            fi

            # Xcode 复制 XCFramework 时会去掉开发头文件，因此框架主体忽略资源封装检查；
            # 主二进制和所有实际执行的 Sparkle 辅助组件仍必须通过代码签名校验。
            codesign --verify --strict --ignore-resources --verbose=4 \
              "$APP_PATH/Contents/Frameworks/Sparkle.framework/Versions/B/Sparkle"

            for COMPONENT in \
              "$APP_PATH/Contents/Frameworks/Sparkle.framework/Versions/B/Updater.app" \
              "$APP_PATH/Contents/Frameworks/Sparkle.framework/Versions/B/Autoupdate" \
              "$APP_PATH/Contents/Frameworks/Sparkle.framework/Versions/B/XPCServices/Downloader.xpc" \
              "$APP_PATH/Contents/Frameworks/Sparkle.framework/Versions/B/XPCServices/Installer.xpc"; do
              codesign --verify --strict --verbose=4 "$COMPONENT"
            done
          done

      - name: Package app and DMG
        run: |
          set -euo pipefail

          ARM64_APP_PATH="$BUILD_PRODUCTS_PATH/arm64/$APP_NAME.app"
          VERSION="$(
            /usr/libexec/PlistBuddy \
              -c 'Print :CFBundleShortVersionString' \
              "$ARM64_APP_PATH/Contents/Info.plist"
          )"

          mkdir -p dist/update

          for ARCH in arm64 x86_64; do
            APP_PATH="$BUILD_PRODUCTS_PATH/$ARCH/$APP_NAME.app"
            ARCHIVE_NAME="bagayalu-translate-v$VERSION-$ARCH.zip"
            DMG_NAME="bagayalu-translate-v$VERSION-$ARCH.dmg"
            DMG_ROOT="dist/dmg-root-$ARCH"

            ditto -c -k --sequesterRsrc --keepParent \
              "$APP_PATH" \
              "dist/update/$ARCHIVE_NAME"

            mkdir -p "$DMG_ROOT"
            ditto "$APP_PATH" "$DMG_ROOT/$APP_NAME.app"
            ln -s /Applications "$DMG_ROOT/Applications"
            hdiutil create \
              -volname "大佐翻译官 v$VERSION $ARCH" \
              -srcfolder "$DMG_ROOT" \
              -ov \
              -format UDZO \
              "dist/$DMG_NAME"

            rm -rf "$DMG_ROOT"

          done

      - name: Generate signed Sparkle appcast
        if: github.event_name == 'workflow_dispatch'
        env:
          SPARKLE_PRIVATE_KEY: ${{ secrets.SPARKLE_PRIVATE_KEY }}
        run: |
          set -euo pipefail

          if [ -z "$SPARKLE_PRIVATE_KEY" ]; then
            echo "仓库缺少 SPARKLE_PRIVATE_KEY Secret。" >&2
            exit 1
          fi

          GENERATE_APPCAST="$(
            find "$DERIVED_DATA_PATH/SourcePackages/artifacts" \
              -type f \
              -path '*/Sparkle/bin/generate_appcast' \
              -print \
              -quit
          )"

          if [ -z "$GENERATE_APPCAST" ]; then
            echo "找不到 Sparkle generate_appcast 工具。" >&2
            exit 1
          fi

          for ARCH in arm64 x86_64; do
            APPCAST_INPUT="$RUNNER_TEMP/appcast-$ARCH"
            mkdir -p "$APPCAST_INPUT"
            cp \
              "dist/update/bagayalu-translate-v$RELEASE_VERSION-$ARCH.zip" \
              "$APPCAST_INPUT/"

            cat > "$APPCAST_INPUT/bagayalu-translate-v$RELEASE_VERSION-$ARCH.md" <<EOF
          # 大佐翻译官 v$RELEASE_VERSION

          - Mini 模式会自动识别中外文并选择更合适的翻译方向。
          - 新增原文、译文和 Mini 窗口独立字号滑块及实时预览。
          - 优先启用全局快捷键，并增强授权刷新、失败回退和模式提醒。
          - 主界面可直接切换翻译服务，设置页接口配置更清晰。
          - Mini 智能方向介入时会在结果底部显示状态提示。
          EOF

            printf '%s' "$SPARKLE_PRIVATE_KEY" |
              "$GENERATE_APPCAST" \
                --ed-key-file - \
                --download-url-prefix \
                "https://github.com/Achordchan/bagayalu-translate/releases/download/v$RELEASE_VERSION/" \
                --link \
                "https://github.com/Achordchan/bagayalu-translate" \
                --embed-release-notes \
                --maximum-deltas 0 \
                "$APPCAST_INPUT"

            test -f "$APPCAST_INPUT/appcast.xml"
          done

          python3 - \
            "$RUNNER_TEMP/appcast-arm64/appcast.xml" \
            "$RUNNER_TEMP/appcast-x86_64/appcast.xml" \
            "dist/update/appcast.xml" <<'PY'
          import re
          import sys
          from pathlib import Path

          arm_appcast = Path(sys.argv[1]).read_text(encoding="utf-8")
          x86_appcast = Path(sys.argv[2]).read_text(encoding="utf-8")
          output_path = Path(sys.argv[3])

          x86_item = re.search(r"<item>.*?</item>", x86_appcast, re.DOTALL)
          if x86_item is None:
              raise SystemExit("x86_64 appcast 中找不到更新项。")

          channel_end = "</channel>"
          if arm_appcast.count(channel_end) != 1:
              raise SystemExit("arm64 appcast 的 channel 结构异常。")

          merged = arm_appcast.replace(
              channel_end,
              f"{x86_item.group(0)}\n    {channel_end}",
          )
          output_path.write_text(merged, encoding="utf-8")
          PY

          test -f dist/update/appcast.xml
          xmllint --noout dist/update/appcast.xml

          ITEM_COUNT="$(xmllint --xpath 'count(/rss/channel/item)' dist/update/appcast.xml)"
          SIGNATURE_COUNT="$(grep -o 'sparkle:edSignature=' dist/update/appcast.xml | wc -l | tr -d ' ')"
          FIRST_URL="$(xmllint --xpath 'string(/rss/channel/item[1]/enclosure/@url)' dist/update/appcast.xml)"
          SECOND_URL="$(xmllint --xpath 'string(/rss/channel/item[2]/enclosure/@url)' dist/update/appcast.xml)"
          ARM_REQUIREMENT="$(xmllint --xpath 'string(/rss/channel/item[1]/*[local-name()="hardwareRequirements"])' dist/update/appcast.xml)"

          [ "$ITEM_COUNT" = "2" ]
          [ "$SIGNATURE_COUNT" = "2" ]
          [[ "$FIRST_URL" == *"bagayalu-translate-v$RELEASE_VERSION-arm64.zip" ]]
          [[ "$SECOND_URL" == *"bagayalu-translate-v$RELEASE_VERSION-x86_64.zip" ]]
          [ "$ARM_REQUIREMENT" = "arm64" ]

      - name: Upload build artifact
        uses: actions/upload-artifact@65c4c4a1ddee5b72f698fdd19549f0f0fb45cf08 # v4.6.0
        with:
          name: 大佐翻译官-macOS
          path: |
            dist/*.dmg
            dist/update/*
          if-no-files-found: error

  release-macos:
    name: Create GitHub Release
    if: github.event_name == 'workflow_dispatch'
    needs: build-macos
    runs-on: ubuntu-latest
    permissions:
      contents: write

    env:
      RELEASE_VERSION: ${{ inputs.version }}

    steps:
      - name: Download build artifact
        uses: actions/download-artifact@95815c38cf2ff2164869cbab79da8d1f422bc89e # v4.2.1
        with:
          name: 大佐翻译官-macOS
          path: dist

      - name: Create Tag and GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          mapfile -t DMGS < <(find dist -type f -name '*.dmg' | sort)
          mapfile -t ZIPS < <(find dist -type f -name '*.zip' | sort)
          APPCAST="$(find dist -type f -name 'appcast.xml' | head -1)"

          if [ ${#DMGS[@]} -eq 0 ] || [ ${#ZIPS[@]} -eq 0 ] || [ -z "$APPCAST" ]; then
            echo "发布产物不完整。" >&2
            find dist -type f -print >&2 || true
            exit 1
          fi

          RELEASE_NOTES="$RUNNER_TEMP/release-notes.md"
          cat > "$RELEASE_NOTES" <<EOF
          ## 大佐翻译官 v$RELEASE_VERSION

          - Mini 模式会自动识别中外文并选择更合适的翻译方向。
          - 新增原文、译文和 Mini 窗口独立字号滑块及实时预览。
          - 优先启用全局快捷键，并增强授权刷新、失败回退和模式提醒。
          - 主界面可直接切换翻译服务，设置页接口配置更清晰。
          - Mini 智能方向介入时会在结果底部显示状态提示。
          - 分别提供 Apple Silicon（arm64）和 Intel（x86_64）安装包。
          - 主程序不使用 Developer ID 分发签名，更新包继续通过 Sparkle EdDSA 签名验证；未经过 Apple 公证。
          EOF

          # appcast 仅在 workflow_dispatch 的 build job 生成；push 构建不进入此 job。
          gh release create "v$RELEASE_VERSION" \
            --repo "$GITHUB_REPOSITORY" \
            --target "$GITHUB_SHA" \
            --title "大佐翻译官 v$RELEASE_VERSION" \
            --notes-file "$RELEASE_NOTES" \
            "${DMGS[@]}" \
            "${ZIPS[@]}" \
            "$APPCAST"
