name: Build and Release macOS

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      version:
        description: 要发布的版本号，必须与 Xcode 中的 MARKETING_VERSION 一致
        required: true
        default: 1.2.2
        type: string

permissions:
  contents: read

concurrency:
  group: macos-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-macos:
    name: Build macOS App
    runs-on: macos-15
    permissions:
      contents: read

    env:
      XCODE_PROJECT: 大佐翻译官v1.xcodeproj
      XCODE_SCHEME: dazuofanyiguan
      XCODE_TARGET: 大佐翻译官v1
      APP_NAME: 大佐翻译官v1
      DERIVED_DATA_PATH: build
      BUILD_PRODUCTS_PATH: build-products
      RELEASE_VERSION: ${{ inputs.version }}
      APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}

    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Import Developer ID signing identity
        if: github.event_name == 'workflow_dispatch'
        env:
          CERTIFICATE_P12_BASE64: ${{ secrets.DEVELOPER_ID_APPLICATION_P12_BASE64 }}
          CERTIFICATE_PASSWORD: ${{ secrets.DEVELOPER_ID_APPLICATION_PASSWORD }}
          NOTARY_KEY_P8_BASE64: ${{ secrets.APPLE_NOTARY_KEY_P8_BASE64 }}
          NOTARY_KEY_ID: ${{ secrets.APPLE_NOTARY_KEY_ID }}
          NOTARY_ISSUER_ID: ${{ secrets.APPLE_NOTARY_ISSUER_ID }}
        run: |
          set -euo pipefail

          if [ -z "$CERTIFICATE_P12_BASE64" ] || \
             [ -z "$CERTIFICATE_PASSWORD" ] || \
             [ -z "$APPLE_TEAM_ID" ] || \
             [ -z "$NOTARY_KEY_P8_BASE64" ] || \
             [ -z "$NOTARY_KEY_ID" ] || \
             [ -z "$NOTARY_ISSUER_ID" ]; then
            echo "正式发布必须配置 Developer ID 签名证书和 Apple 公证凭据。" >&2
            exit 1
          fi

          CERTIFICATE_PATH="$RUNNER_TEMP/developer-id-application.p12"
          NOTARY_KEY_PATH="$RUNNER_TEMP/AuthKey_$NOTARY_KEY_ID.p8"
          SIGNING_KEYCHAIN="$RUNNER_TEMP/app-signing.keychain-db"
          KEYCHAIN_PASSWORD="$(openssl rand -base64 32)"

          printf '%s' "$CERTIFICATE_P12_BASE64" | base64 --decode > "$CERTIFICATE_PATH"
          printf '%s' "$NOTARY_KEY_P8_BASE64" | base64 --decode > "$NOTARY_KEY_PATH"
          chmod 600 "$CERTIFICATE_PATH" "$NOTARY_KEY_PATH"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$SIGNING_KEYCHAIN"
          security set-keychain-settings -lut 21600 "$SIGNING_KEYCHAIN"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$SIGNING_KEYCHAIN"
          security import "$CERTIFICATE_PATH" \
            -k "$SIGNING_KEYCHAIN" \
            -P "$CERTIFICATE_PASSWORD" \
            -T /usr/bin/codesign \
            -T /usr/bin/security
          security set-key-partition-list \
            -S apple-tool:,apple:,codesign: \
            -s \
            -k "$KEYCHAIN_PASSWORD" \
            "$SIGNING_KEYCHAIN"
          security list-keychains -d user -s "$SIGNING_KEYCHAIN"
          security default-keychain -d user -s "$SIGNING_KEYCHAIN"

          SIGNING_IDENTITY="$(
            security find-identity -v -p codesigning "$SIGNING_KEYCHAIN" |
              sed -n 's/.*"\(Developer ID Application:.*\)"/\1/p' |
              head -1
          )"

          if [ -z "$SIGNING_IDENTITY" ]; then
            echo "导入的 P12 中找不到 Developer ID Application 身份。" >&2
            exit 1
          fi

          echo "SIGNING_IDENTITY=$SIGNING_IDENTITY" >> "$GITHUB_ENV"
          echo "SIGNING_KEYCHAIN=$SIGNING_KEYCHAIN" >> "$GITHUB_ENV"
          echo "NOTARY_KEY_PATH=$NOTARY_KEY_PATH" >> "$GITHUB_ENV"
          echo "NOTARY_KEY_ID=$NOTARY_KEY_ID" >> "$GITHUB_ENV"
          echo "NOTARY_ISSUER_ID=$NOTARY_ISSUER_ID" >> "$GITHUB_ENV"
          echo "已导入正式签名身份：$SIGNING_IDENTITY"

      - name: Validate release version
        if: github.event_name == 'workflow_dispatch'
        run: |
          set -euo pipefail

          PROJECT_VERSION="$(
            xcodebuild \
              -project "$XCODE_PROJECT" \
              -target "$XCODE_TARGET" \
              -configuration Release \
              -showBuildSettings |
            awk '/MARKETING_VERSION =/ { print $3; exit }'
          )"
          PROJECT_BUILD="$(
            xcodebuild \
              -project "$XCODE_PROJECT" \
              -target "$XCODE_TARGET" \
              -configuration Release \
              -showBuildSettings |
            awk '/CURRENT_PROJECT_VERSION =/ { print $3; exit }'
          )"

          if [ -z "$RELEASE_VERSION" ]; then
            echo "发布版本号不能为空。" >&2
            exit 1
          fi

          if ! [[ "$RELEASE_VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "发布版本号必须使用 x.y.z 格式。" >&2
            exit 1
          fi

          if [ "$PROJECT_VERSION" != "$RELEASE_VERSION" ]; then
            echo "工作流版本 $RELEASE_VERSION 与项目版本 $PROJECT_VERSION 不一致。" >&2
            exit 1
          fi

          if ! [[ "$PROJECT_BUILD" =~ ^[0-9]+$ ]] || [ "$PROJECT_BUILD" -le 0 ]; then
            echo "CURRENT_PROJECT_VERSION 必须是正整数。" >&2
            exit 1
          fi

          LATEST_APPCAST="$RUNNER_TEMP/latest-appcast.xml"
          if curl --fail --location --silent --show-error \
            "https://github.com/Achordchan/bagayalu-translate/releases/latest/download/appcast.xml" \
            --output "$LATEST_APPCAST"; then
            LATEST_BUILD="$(
              sed -n 's|.*<sparkle:version>\\([^<]*\\)</sparkle:version>.*|\\1|p' \
                "$LATEST_APPCAST" |
              head -1
            )"
            if [[ "$LATEST_BUILD" =~ ^[0-9]+$ ]] && [ "$PROJECT_BUILD" -le "$LATEST_BUILD" ]; then
              echo "构建号 $PROJECT_BUILD 必须大于线上构建号 $LATEST_BUILD。" >&2
              exit 1
            fi
          fi

          TAG="v$RELEASE_VERSION"
          if git ls-remote --exit-code --tags origin "refs/tags/$TAG" >/dev/null 2>&1; then
            echo "Tag $TAG 已存在，请提升版本号后重新发布。" >&2
            exit 1
          fi

      - name: Build architecture-specific Release apps
        run: |
          set -euo pipefail

          if [ "$GITHUB_EVENT_NAME" = "workflow_dispatch" ]; then
            SIGNING_ARGUMENTS=(
              "CODE_SIGN_STYLE=Manual"
              "CODE_SIGN_IDENTITY=$SIGNING_IDENTITY"
              "DEVELOPMENT_TEAM=$APPLE_TEAM_ID"
              "OTHER_CODE_SIGN_FLAGS=--timestamp"
            )
          else
            SIGNING_ARGUMENTS=(
              "CODE_SIGN_STYLE=Manual"
              "CODE_SIGN_IDENTITY=-"
              "DEVELOPMENT_TEAM="
            )
          fi

          for ARCH in arm64 x86_64; do
            OUTPUT_PATH="$GITHUB_WORKSPACE/$BUILD_PRODUCTS_PATH/$ARCH"
            xcodebuild \
              -project "$XCODE_PROJECT" \
              -scheme "$XCODE_SCHEME" \
              -configuration Release \
              -destination "generic/platform=macOS" \
              -derivedDataPath "$DERIVED_DATA_PATH" \
              ARCHS="$ARCH" \
              ONLY_ACTIVE_ARCH=YES \
              CONFIGURATION_BUILD_DIR="$OUTPUT_PATH" \
              CODE_SIGN_INJECT_BASE_ENTITLEMENTS=NO \
              "${SIGNING_ARGUMENTS[@]}" \
              build
          done

      - name: Verify app signatures and architectures
        run: |
          set -euo pipefail

          for ARCH in arm64 x86_64; do
            APP_PATH="$BUILD_PRODUCTS_PATH/$ARCH/$APP_NAME.app"

            if [ ! -d "$APP_PATH" ]; then
              echo "找不到 $ARCH 构建产物：$APP_PATH" >&2
              exit 1
            fi

            codesign --verify --deep --strict --verbose=4 "$APP_PATH"

            ARCHITECTURES="$(lipo -archs "$APP_PATH/Contents/MacOS/$APP_NAME")"
            echo "$ARCH 构建架构：$ARCHITECTURES"
            [ "$ARCHITECTURES" = "$ARCH" ]

            if [ "$GITHUB_EVENT_NAME" = "workflow_dispatch" ]; then
              SIGNATURE_INFO="$(codesign -dv --verbose=4 "$APP_PATH" 2>&1)"
              DESIGNATED_REQUIREMENT="$(codesign -d -r- "$APP_PATH" 2>&1)"
              REQUIREMENT_EXPRESSION="$(
                sed -n '/^designated =>/p' <<< "$DESIGNATED_REQUIREMENT"
              )"

              printf '%s\n' "$SIGNATURE_INFO"
              printf '%s\n' "$REQUIREMENT_EXPRESSION" > "$RUNNER_TEMP/designated-requirement-$ARCH.txt"

              grep -q 'Authority=Developer ID Application:' <<< "$SIGNATURE_INFO"
              grep -q "TeamIdentifier=$APPLE_TEAM_ID" <<< "$SIGNATURE_INFO"
              ! grep -q 'Signature=adhoc' <<< "$SIGNATURE_INFO"
              grep -q 'anchor apple' <<< "$REQUIREMENT_EXPRESSION"
              ! grep -q 'designated => cdhash' <<< "$REQUIREMENT_EXPRESSION"
            fi
          done

          if [ "$GITHUB_EVENT_NAME" = "workflow_dispatch" ]; then
            diff -u \
              "$RUNNER_TEMP/designated-requirement-arm64.txt" \
              "$RUNNER_TEMP/designated-requirement-x86_64.txt"
          fi

      - name: Notarize and staple release apps
        if: github.event_name == 'workflow_dispatch'
        run: |
          set -euo pipefail

          for ARCH in arm64 x86_64; do
            APP_PATH="$BUILD_PRODUCTS_PATH/$ARCH/$APP_NAME.app"
            NOTARY_ARCHIVE="$RUNNER_TEMP/bagayalu-translate-$ARCH-notary.zip"

            ditto -c -k --sequesterRsrc --keepParent \
              "$APP_PATH" \
              "$NOTARY_ARCHIVE"

            xcrun notarytool submit "$NOTARY_ARCHIVE" \
              --key "$NOTARY_KEY_PATH" \
              --key-id "$NOTARY_KEY_ID" \
              --issuer "$NOTARY_ISSUER_ID" \
              --wait \
              --timeout 30m

            xcrun stapler staple "$APP_PATH"
            xcrun stapler validate "$APP_PATH"
            codesign --verify --deep --strict --verbose=4 "$APP_PATH"
            spctl --assess --type execute --verbose=4 "$APP_PATH"
          done

      - name: Package app and DMG
        run: |
          set -euo pipefail

          ARM64_APP_PATH="$BUILD_PRODUCTS_PATH/arm64/$APP_NAME.app"
          VERSION="$(
            /usr/libexec/PlistBuddy \
              -c 'Print :CFBundleShortVersionString' \
              "$ARM64_APP_PATH/Contents/Info.plist"
          )"

          mkdir -p dist/update

          for ARCH in arm64 x86_64; do
            APP_PATH="$BUILD_PRODUCTS_PATH/$ARCH/$APP_NAME.app"
            ARCHIVE_NAME="bagayalu-translate-v$VERSION-$ARCH.zip"
            DMG_NAME="bagayalu-translate-v$VERSION-$ARCH.dmg"
            DMG_ROOT="dist/dmg-root-$ARCH"

            ditto -c -k --sequesterRsrc --keepParent \
              "$APP_PATH" \
              "dist/update/$ARCHIVE_NAME"

            mkdir -p "$DMG_ROOT"
            ditto "$APP_PATH" "$DMG_ROOT/$APP_NAME.app"
            ln -s /Applications "$DMG_ROOT/Applications"
            hdiutil create \
              -volname "大佐翻译官 v$VERSION $ARCH" \
              -srcfolder "$DMG_ROOT" \
              -ov \
              -format UDZO \
              "dist/$DMG_NAME"

            rm -rf "$DMG_ROOT"

            if [ "$GITHUB_EVENT_NAME" = "workflow_dispatch" ]; then
              DMG_PATH="dist/$DMG_NAME"
              codesign \
                --force \
                --sign "$SIGNING_IDENTITY" \
                --timestamp \
                "$DMG_PATH"

              xcrun notarytool submit "$DMG_PATH" \
                --key "$NOTARY_KEY_PATH" \
                --key-id "$NOTARY_KEY_ID" \
                --issuer "$NOTARY_ISSUER_ID" \
                --wait \
                --timeout 30m

              xcrun stapler staple "$DMG_PATH"
              xcrun stapler validate "$DMG_PATH"
              codesign --verify --verbose=4 "$DMG_PATH"
              spctl \
                --assess \
                --type open \
                --context context:primary-signature \
                --verbose=4 \
                "$DMG_PATH"
            fi
          done

      - name: Generate signed Sparkle appcast
        if: github.event_name == 'workflow_dispatch'
        env:
          SPARKLE_PRIVATE_KEY: ${{ secrets.SPARKLE_PRIVATE_KEY }}
        run: |
          set -euo pipefail

          if [ -z "$SPARKLE_PRIVATE_KEY" ]; then
            echo "仓库缺少 SPARKLE_PRIVATE_KEY Secret。" >&2
            exit 1
          fi

          GENERATE_APPCAST="$(
            find "$DERIVED_DATA_PATH/SourcePackages/artifacts" \
              -type f \
              -path '*/Sparkle/bin/generate_appcast' \
              -print \
              -quit
          )"

          if [ -z "$GENERATE_APPCAST" ]; then
            echo "找不到 Sparkle generate_appcast 工具。" >&2
            exit 1
          fi

          for ARCH in arm64 x86_64; do
            APPCAST_INPUT="$RUNNER_TEMP/appcast-$ARCH"
            mkdir -p "$APPCAST_INPUT"
            cp \
              "dist/update/bagayalu-translate-v$RELEASE_VERSION-$ARCH.zip" \
              "$APPCAST_INPUT/"

            cat > "$APPCAST_INPUT/bagayalu-translate-v$RELEASE_VERSION-$ARCH.md" <<EOF
          # 大佐翻译官 v$RELEASE_VERSION

          - Mini 模式会自动识别中外文并选择更合适的翻译方向。
          - 新增原文、译文和 Mini 窗口独立字号滑块及实时预览。
          - 优先启用全局快捷键，并增强授权刷新、失败回退和模式提醒。
          - 主界面可直接切换翻译服务，设置页接口配置更清晰。
          - Mini 智能方向介入时会在结果底部显示状态提示。
          EOF

            printf '%s' "$SPARKLE_PRIVATE_KEY" |
              "$GENERATE_APPCAST" \
                --ed-key-file - \
                --download-url-prefix \
                "https://github.com/Achordchan/bagayalu-translate/releases/download/v$RELEASE_VERSION/" \
                --link \
                "https://github.com/Achordchan/bagayalu-translate" \
                --embed-release-notes \
                --maximum-deltas 0 \
                "$APPCAST_INPUT"

            test -f "$APPCAST_INPUT/appcast.xml"
          done

          python3 - \
            "$RUNNER_TEMP/appcast-arm64/appcast.xml" \
            "$RUNNER_TEMP/appcast-x86_64/appcast.xml" \
            "dist/update/appcast.xml" <<'PY'
          import re
          import sys
          from pathlib import Path

          arm_appcast = Path(sys.argv[1]).read_text(encoding="utf-8")
          x86_appcast = Path(sys.argv[2]).read_text(encoding="utf-8")
          output_path = Path(sys.argv[3])

          x86_item = re.search(r"<item>.*?</item>", x86_appcast, re.DOTALL)
          if x86_item is None:
              raise SystemExit("x86_64 appcast 中找不到更新项。")

          channel_end = "</channel>"
          if arm_appcast.count(channel_end) != 1:
              raise SystemExit("arm64 appcast 的 channel 结构异常。")

          merged = arm_appcast.replace(
              channel_end,
              f"{x86_item.group(0)}\n    {channel_end}",
          )
          output_path.write_text(merged, encoding="utf-8")
          PY

          test -f dist/update/appcast.xml
          xmllint --noout dist/update/appcast.xml

          ITEM_COUNT="$(xmllint --xpath 'count(/rss/channel/item)' dist/update/appcast.xml)"
          SIGNATURE_COUNT="$(grep -o 'sparkle:edSignature=' dist/update/appcast.xml | wc -l | tr -d ' ')"
          FIRST_URL="$(xmllint --xpath 'string(/rss/channel/item[1]/enclosure/@url)' dist/update/appcast.xml)"
          SECOND_URL="$(xmllint --xpath 'string(/rss/channel/item[2]/enclosure/@url)' dist/update/appcast.xml)"
          ARM_REQUIREMENT="$(xmllint --xpath 'string(/rss/channel/item[1]/*[local-name()="hardwareRequirements"])' dist/update/appcast.xml)"

          [ "$ITEM_COUNT" = "2" ]
          [ "$SIGNATURE_COUNT" = "2" ]
          [[ "$FIRST_URL" == *"bagayalu-translate-v$RELEASE_VERSION-arm64.zip" ]]
          [[ "$SECOND_URL" == *"bagayalu-translate-v$RELEASE_VERSION-x86_64.zip" ]]
          [ "$ARM_REQUIREMENT" = "arm64" ]

      - name: Upload build artifact
        uses: actions/upload-artifact@65c4c4a1ddee5b72f698fdd19549f0f0fb45cf08 # v4.6.0
        with:
          name: 大佐翻译官-macOS
          path: |
            dist/*.dmg
            dist/update/*
          if-no-files-found: error

      - name: Clean signing material
        if: always() && github.event_name == 'workflow_dispatch'
        run: |
          if [ -n "${SIGNING_KEYCHAIN:-}" ]; then
            security delete-keychain "$SIGNING_KEYCHAIN" || true
          fi
          rm -f \
            "$RUNNER_TEMP/developer-id-application.p12" \
            "$RUNNER_TEMP"/AuthKey_*.p8

  release-macos:
    name: Create GitHub Release
    if: github.event_name == 'workflow_dispatch'
    needs: build-macos
    runs-on: ubuntu-latest
    permissions:
      contents: write

    env:
      RELEASE_VERSION: ${{ inputs.version }}

    steps:
      - name: Download build artifact
        uses: actions/download-artifact@95815c38cf2ff2164869cbab79da8d1f422bc89e # v4.2.1
        with:
          name: 大佐翻译官-macOS
          path: dist

      - name: Create Tag and GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          mapfile -t DMGS < <(find dist -type f -name '*.dmg' | sort)
          mapfile -t ZIPS < <(find dist -type f -name '*.zip' | sort)
          APPCAST="$(find dist -type f -name 'appcast.xml' | head -1)"

          if [ ${#DMGS[@]} -eq 0 ] || [ ${#ZIPS[@]} -eq 0 ] || [ -z "$APPCAST" ]; then
            echo "发布产物不完整。" >&2
            find dist -type f -print >&2 || true
            exit 1
          fi

          RELEASE_NOTES="$RUNNER_TEMP/release-notes.md"
          cat > "$RELEASE_NOTES" <<EOF
          ## 大佐翻译官 v$RELEASE_VERSION

          - Mini 模式会自动识别中外文并选择更合适的翻译方向。
          - 新增原文、译文和 Mini 窗口独立字号滑块及实时预览。
          - 优先启用全局快捷键，并增强授权刷新、失败回退和模式提醒。
          - 主界面可直接切换翻译服务，设置页接口配置更清晰。
          - Mini 智能方向介入时会在结果底部显示状态提示。
          - 分别提供 Apple Silicon（arm64）和 Intel（x86_64）安装包。
          - 使用 Developer ID 稳定签名并通过 Apple 公证，后续更新可保持系统权限身份一致。
          EOF

          # appcast 仅在 workflow_dispatch 的 build job 生成；push 构建不进入此 job。
          gh release create "v$RELEASE_VERSION" \
            --repo "$GITHUB_REPOSITORY" \
            --target "$GITHUB_SHA" \
            --title "大佐翻译官 v$RELEASE_VERSION" \
            --notes-file "$RELEASE_NOTES" \
            "${DMGS[@]}" \
            "${ZIPS[@]}" \
            "$APPCAST"
